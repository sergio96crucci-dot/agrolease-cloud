<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroLease Tracker V10 - Cloud</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D5A27">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        :root { --primary: #2D5A27; --bg: #f4f4f4; --danger: #ef4444; --warning: #eab308; --success: #22c55e; --blue: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; transition: transform 0.3s; z-index: 2000; }
        .sidebar.hidden { transform: translateX(-100%); width: 0; }
        
        .toggle-btn { position: absolute; left: 320px; top: 10px; z-index: 2001; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 0 5px 5px 0; cursor: pointer; }
        .sidebar.hidden + .toggle-btn { left: 0; }
        
        .sb-header { background: var(--primary); color: white; padding: 15px; }
        #field-list { flex: 1; overflow-y: auto; padding: 10px; }
        .field-card { border: 1px solid #eee; padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; }
        
        .map-container { flex: 1; position: relative; height: 100%; }
        #map { height: 100%; width: 100%; }
        
        .geo-btn { position: absolute; top: 70px; right: 10px; z-index: 1000; background: white; padding: 8px; border-radius: 4px; cursor: pointer; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sb-header">
            <h3>AgroLease</h3>
            <div id="total-ha" style="font-weight:bold;">Ha: 0</div>
        </div>
        <input type="text" id="list-search" placeholder="Buscar..." style="padding:10px; width:100%;">
        <div id="field-list"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <button onclick="exportData()" style="flex:1">Backup</button>
            <button onclick="document.getElementById('import').click()" style="flex:1">Cargar</button>
            <input type="file" id="import" style="display:none" onchange="importData(this)">
        </div>
    </div>
    <button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('hidden')">☰</button>

    <div class="map-container">
        <div id="map"></div>
        <div class="geo-btn" onclick="localizarUsuario()">📍</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    let map, drawnItems;

    function init() {
        map = L.map('map').setView([-32.714, -62.719], 13);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        drawnItems = new L.FeatureGroup().addTo(map);
        new L.Control.Draw({ draw: { polygon: true, rectangle: false, circle: false, marker: false, polyline: false } }).addTo(map);
    }

    function localizarUsuario() {
        if (!navigator.geolocation) return alert("Geolocalización no soportada");
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            L.marker([pos.coords.latitude, pos.coords.longitude]).addTo(map).bindPopup("¡Estás acá!").openPopup();
        });
    }

    window.onload = init;
</script>
</body>
</html>
