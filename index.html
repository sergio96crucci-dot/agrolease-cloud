<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroLease Tracker V10 - Cloud</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D5A27">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        :root { --primary: #2D5A27; --bg: #f4f4f4; --danger: #ef4444; --warning: #eab308; --success: #22c55e; --blue: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }
        
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; transition: transform 0.3s; z-index: 2000; position: absolute; height: 100%; }
        .sidebar.hidden { transform: translateX(-100%); }
        .toggle-btn { position: absolute; left: 320px; top: 10px; z-index: 2001; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 0 5px 5px 0; cursor: pointer; transition: left 0.3s; }
        .sidebar.hidden + .toggle-btn { left: 0; }
        
        .sb-header { background: var(--primary); color: white; padding: 15px; }
        #field-list { flex: 1; overflow-y: auto; padding: 10px; }
        .field-card { border: 1px solid #eee; padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; }
        
        .map-container { flex: 1; position: relative; height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; }
        .geo-btn { position: absolute; top: 70px; right: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; cursor: pointer; box-shadow: 0 0 5px rgba(0,0,0,0.3); font-size: 20px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        .form-input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sb-header"><h3>AgroLease Tracker V10</h3><div id="total-ha">Ha: 0</div></div>
        <input type="text" id="list-search" placeholder="Buscar..." class="form-input">
        <div id="field-list"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <button onclick="exportData()" style="flex:1">Backup</button>
            <button onclick="document.getElementById('import').click()" style="flex:1">Subir a Nube</button>
            <input type="file" id="import" style="display:none" accept=".json" onchange="importData(this)">
        </div>
    </div>
    <button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('hidden')">☰</button>
    <div class="map-container">
        <div id="map"></div>
        <div class="geo-btn" onclick="localizarUsuario()">📍</div>
    </div>
</div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
        <h4>Datos del Lote</h4>
        <input type="text" id="f-producer" class="form-input" placeholder="Productor">
        <input type="text" id="f-owner" class="form-input" placeholder="Dueño">
        <input type="number" id="f-ha" class="form-input" placeholder="Ha">
        <textarea id="f-notes" class="form-input" placeholder="Notas"></textarea>
        <button onclick="saveField()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none;">Guardar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDi70QeV1iJhGg-s4jvvgDGkzY25sk4DMM",
      authDomain: "agrolease-cloud.firebaseapp.com",
      projectId: "agrolease-cloud",
      storageBucket: "agrolease-cloud.firebasestorage.app",
      messagingSenderId: "1028397749370",
      appId: "1:1028397749370:web:e9535daccb3d8dba37d7c3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let map, drawnItems, lastLayer, editingId = null;
    let fields = [];

    function init() {
        map = L.map('map').setView([-32.714, -62.719], 13);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        drawnItems = new L.FeatureGroup().addTo(map);
        new L.Control.Draw({ draw: { polygon: true, rectangle: false, circle: false, marker: false, polyline: false } }).addTo(map);

        map.on(L.Draw.Event.CREATED, (e) => {
            lastLayer = e.layer; lastLayer.addTo(map);
            document.getElementById('f-ha').value = (L.GeometryUtil.geodesicArea(lastLayer.getLatLngs()[0]) / 10000).toFixed(1);
            document.getElementById('modal-overlay').style.display = 'flex';
        });

        db.collection("lotes").onSnapshot(ss => {
            fields = [];
            ss.forEach(doc => {
                let d = doc.data();
                if (typeof d.coords === 'string') d.coords = JSON.parse(d.coords);
                fields.push(d);
            });
            renderAll();
        });
    }

    function localizarUsuario() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            L.marker([pos.coords.latitude, pos.coords.longitude]).addTo(map).bindPopup("¡Estás acá!").openPopup();
        });
    }

    function saveField() {
        const data = {
            id: Date.now(),
            owner: document.getElementById('f-owner').value,
            producer: document.getElementById('f-producer').value,
            ha: parseFloat(document.getElementById('f-ha').value),
            notes: document.getElementById('f-notes').value,
            coords: JSON.stringify(lastLayer.getLatLngs()[0].map(ll => [ll.lat, ll.lng]))
        };
        db.collection("lotes").doc(data.id.toString()).set(data).then(() => {
            document.getElementById('modal-overlay').style.display = 'none';
        });
    }

    function renderAll() {
        drawnItems.clearLayers();
        fields.forEach(f => {
            L.polygon(f.coords, {color: 'blue'}).addTo(drawnItems).bindPopup(f.producer);
        });
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(fields)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "backup.json"; a.click();
    }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            for(let f of data) {
                if(Array.isArray(f.coords)) f.coords = JSON.stringify(f.coords);
                await db.collection("lotes").doc(f.id.toString()).set(f);
            }
            alert("Backup cargado!");
        };
        reader.readAsText(input.files[0]);
    }

    window.onload = init;
</script>
<script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
