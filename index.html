<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroLease Tracker V10 - Cloud</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D5A27">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        :root { --primary: #2D5A27; --bg: #f4f4f4; --danger: #ef4444; --warning: #eab308; --success: #22c55e; --gray: #9ca3af; --blue: #3b82f6; --dimmed: #e5e7eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; background: #1a2a18; }
        
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 2000; transition: transform 0.3s; position: absolute; height: 100%; }
        .sidebar.hidden { transform: translateX(-100%); width: 0; }
        .toggle-btn { position: absolute; left: 320px; top: 10px; z-index: 2001; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 0 5px 5px 0; cursor: pointer; transition: left 0.3s; }
        .sidebar.hidden + .toggle-btn { left: 0; }
        
        .sb-header { background: var(--primary); color: white; padding: 20px; flex-shrink: 0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,0.15); padding: 10px; border-radius: 8px; }
        .stat-label { font-size: 10px; text-transform: uppercase; opacity: 0.8; }
        .stat-value { font-size: 18px; font-weight: bold; }

        #field-list { flex: 1; overflow-y: auto; padding: 10px; background: #fdfdfd; }
        .field-card { border: 1px solid #eee; padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; background: white; position: relative; }
        .field-card:hover { border-color: var(--primary); }
        .fc-worker { font-weight: bold; font-size: 15px; color: #111; line-height: 1.2; }
        .fc-details { font-size: 11px; color: #666; margin-top: 4px; }
        .btn-del-card { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ccc; cursor: pointer; }
        
        .map-container { flex: 1; height: 100%; position: relative; display: flex; flex-direction: column; width: 100vw; }
        #map { flex: 1; width: 100%; }
        .geo-btn { position: absolute; top: 70px; right: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; cursor: pointer; box-shadow: 0 0 5px rgba(0,0,0,0.3); font-size: 20px; }

        .legend { position: absolute; bottom: 20px; left: 20px; background: white; padding: 12px; border-radius: 8px; border: 1px solid #ccc; z-index: 1000; font-size: 0.8em; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .color-box { width: 14px; height: 14px; border-radius: 3px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-box { background: white; padding: 25px; border-radius: 12px; width: 400px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; text-transform: uppercase; }
        .form-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
        .check-group { display: flex; align-items: center; gap: 8px; background: #eff6ff; padding: 10px; border-radius: 6px; margin-bottom: 12px; border: 1px solid #dbeafe; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-cancel { background: #eee; color: #666; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sb-header">
        <h3 style="font-size: 16px;">AgroLease Tracker V10</h3>
        <p style="font-size: 10px; opacity: 0.7;">Análisis de Superficie (Nube)</p>
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">Ha Enfocadas</div>
                <div id="total-ha" class="stat-value">0</div>
            </div>
            <div class="stat-card" style="background: rgba(239,68,68,0.2);">
                <div class="stat-label" style="color:#fca5a5">Riesgo Vencim.</div>
                <div id="total-alerts" class="stat-value">0</div>
            </div>
        </div>
    </div>
    <div style="padding:10px; border-bottom:1px solid #eee;">
        <input type="text" id="list-search" placeholder="Buscar Productor o Dueño..." class="form-input">
    </div>
    <div id="field-list"></div>
    <div style="padding:10px; display:flex; gap:5px;">
        <button onclick="exportData()" style="flex:1; font-size:10px; padding:5px; border-radius:4px; border:1px solid #ccc; cursor:pointer">Backup</button>
        <button onclick="document.getElementById('import').click()" style="flex:1; font-size:10px; padding:5px; border-radius:4px; border:1px solid #ccc; background:#eff6ff; cursor:pointer">Subir</button>
        <input type="file" id="import" style="display:none" accept=".json" onchange="importData(this)">
    </div>
</div>
<button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('hidden')">☰</button>

<div class="map-container">
    <div id="map"></div>
    <div class="geo-btn" onclick="localizarUsuario()">📍</div>
    <div class="legend">
        <b>Estado de Gestión</b>
        <div class="legend-item"><div class="color-box" style="background:var(--blue)"></div> Propio</div>
        <div class="legend-item"><div class="color-box" style="background:var(--success)"></div> Año 1</div>
        <div class="legend-item"><div class="color-box" style="background:var(--warning)"></div> Año 2</div>
        <div class="legend-item"><div class="color-box" style="background:var(--danger)"></div> Año 3 (Crítico)</div>
    </div>
</div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
        <h4 id="modal-title" style="margin-bottom:15px;">Datos del Lote</h4>
        <div class="check-group">
            <input type="checkbox" id="f-is-own" onchange="toggleOwnField(this.checked)">
            <label for="f-is-own" style="color:var(--blue); font-weight:bold; font-size:11px; cursor:pointer">¿ES CAMPO PROPIO?</label>
        </div>
        <div class="form-group" id="prod-group">
            <label>Productor</label>
            <input type="text" id="f-producer" class="form-input">
        </div>
        <div class="form-group">
            <label>Dueño</label>
            <input type="text" id="f-owner" class="form-input">
        </div>
        <div class="form-group" id="date-group">
            <label>Inicio Arrendamiento</label>
            <input type="month" id="f-date" class="form-input">
        </div>
        <div class="form-group">
            <label>Superficie (Ha)</label>
            <input type="number" id="f-ha" step="0.1" class="form-input">
        </div>
        <button onclick="saveField()" class="btn-primary">✓ GUARDAR LOTE</button>
        <button onclick="closeModal()" class="btn-cancel">Cancelar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDi70QeV1iJhGg-s4jvvgDGkzY25sk4DMM", authDomain: "agrolease-cloud.firebaseapp.com", projectId: "agrolease-cloud", storageBucket: "agrolease-cloud.firebasestorage.app", messagingSenderId: "1028397749370", appId: "1:1028397749370:web:e9535daccb3d8dba37d7c3" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let map, drawnItems, lastLayer, editingId = null;
    let fields = []; 
    const colors = { 0: '#9ca3af', 1: '#22c55e', 2: '#eab308', 3: '#ef4444', 4: '#3b82f6' };

    function calculateStatus(f) {
        if (f.isOwn) return { year: 4, label: 'Propio' };
        if (!f.date) return { year: 0, label: 'Sin Fecha' };
        const diff = (new Date() - new Date(f.date)) / (1000 * 60 * 60 * 24 * 365.25);
        if (diff < 1) return { year: 1, label: 'Año 1' };
        if (diff < 2) return { year: 2, label: 'Año 2' };
        return { year: 3, label: 'Año 3' };
    }

    function init() {
        map = L.map('map').setView([-32.714, -62.719], 13);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        drawnItems = new L.FeatureGroup().addTo(map);
        new L.Control.Draw({ draw: { polygon: true, rectangle: false, circle: false, marker: false, polyline: false } }).addTo(map);

        map.on(L.Draw.Event.CREATED, (e) => {
            lastLayer = e.layer; lastLayer.addTo(map);
            document.getElementById('f-ha').value = (L.GeometryUtil.geodesicArea(lastLayer.getLatLngs()[0]) / 10000).toFixed(1);
            document.getElementById('modal-overlay').style.display = 'flex';
        });

        db.collection("lotes").onSnapshot(ss => {
            fields = [];
            ss.forEach(doc => { let d = doc.data(); if(typeof d.coords === 'string') d.coords = JSON.parse(d.coords); fields.push(d); });
            renderAll();
        });
    }

    function localizarUsuario() {
        if (navigator.geolocation) navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            L.marker([pos.coords.latitude, pos.coords.longitude]).addTo(map).bindPopup("¡Estás acá!").openPopup();
        });
    }

    function toggleOwnField(isOwn) {
        document.getElementById('prod-group').style.display = isOwn ? 'none' : 'block';
        document.getElementById('date-group').style.display = isOwn ? 'none' : 'block';
    }

    function saveField() {
        const isOwn = document.getElementById('f-is-own').checked;
        const data = { 
            id: editingId || Date.now(), 
            isOwn: isOwn,
            owner: document.getElementById('f-owner').value, 
            producer: isOwn ? document.getElementById('f-owner').value : document.getElementById('f-producer').value,
            ha: parseFloat(document.getElementById('f-ha').value),
            date: isOwn ? null : document.getElementById('f-date').value,
            coords: JSON.stringify(lastLayer.getLatLngs()[0].map(ll => [ll.lat, ll.lng])) 
        };
        db.collection("lotes").doc(data.id.toString()).set(data).then(() => { document.getElementById('modal-overlay').style.display = 'none'; });
    }

    function renderAll() {
        drawnItems.clearLayers();
        const list = document.getElementById('field-list'); list.innerHTML = '';
        let totalHa = 0, alertas = 0;
        fields.forEach(f => {
            const status = calculateStatus(f);
            totalHa += f.ha;
            if (status.year === 3) alertas++;
            list.innerHTML += `<div class="field-card" onclick="map.fitBounds(L.polygon(${JSON.stringify(f.coords)}).getBounds())"><b>${f.producer}</b><br>${f.ha} Ha</div>`;
            L.polygon(f.coords, {color: colors[status.year]}).addTo(drawnItems).bindPopup(f.producer);
        });
        document.getElementById('total-ha').innerText = Math.round(totalHa);
        document.getElementById('total-alerts').innerText = alertas;
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function exportData() { const blob = new Blob([JSON.stringify(fields)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "backup.json"; a.click(); }
    function importData(input) { 
        const reader = new FileReader(); reader.onload = async (e) => { 
            const data = JSON.parse(e.target.result); 
            for(let f of data) { if(Array.isArray(f.coords)) f.coords = JSON.stringify(f.coords); await db.collection("lotes").doc(f.id.toString()).set(f); } 
            alert("Backup cargado!"); 
        }; 
        reader.readAsText(input.files[0]); 
    }

    window.onload = init;
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
